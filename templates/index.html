<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager Pro | Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>CONTACT MANAGER <span class="highlight">PRO</span></h1>
            <p class="subtitle">Moderne Kontaktverwaltung für Profis</p>
        </header>

        <main>
            <section class="form-section">
                <div class="glass-card">
                    <h2>Kontakt Details</h2>
                    <form id="contact-form">
                        <input type="hidden" id="contact-index">
                        <div class="input-grid">
                            <div class="input-group">
                                <label for="vorname">Vorname</label>
                                <input type="text" id="vorname" placeholder="Max" required>
                            </div>
                            <div class="input-group">
                                <label for="nachname">Nachname</label>
                                <input type="text" id="nachname" placeholder="Mustermann" required>
                            </div>
                            <div class="input-group">
                                <label for="strasse">Straße</label>
                                <input type="text" id="strasse" placeholder="Hauptstraße 1">
                            </div>
                            <div class="input-group">
                                <label for="plz">PLZ</label>
                                <input type="text" id="plz" placeholder="12345">
                            </div>
                            <div class="input-group">
                                <label for="email">E-Mail</label>
                                <input type="email" id="email" placeholder="max@beispiel.de">
                            </div>
                            <div class="input-group">
                                <label for="rufnummer">Telefon</label>
                                <input type="tel" id="rufnummer" placeholder="+49 123 456789">
                            </div>
                            <div class="input-group">
                                <label for="mobil">Mobil</label>
                                <input type="tel" id="mobil" placeholder="+49 170 1234567">
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" id="submit-btn" class="btn btn-primary">Speichern</button>
                            <button type="button" id="cancel-btn" class="btn btn-secondary hidden">Abbrechen</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="search-section">
                <div class="search-box glass-card">
                    <input type="text" id="search-input" placeholder="Nach Namen oder Nummer suchen...">
                    <span class="search-icon">🔍</span>
                </div>
            </section>

            <section class="list-section">
                <div class="glass-card table-container">
                    <table id="contacts-table">
                        <thead>
                            <tr>
                                <th>Vorname</th>
                                <th>Nachname</th>
                                <th>Straße</th>
                                <th>PLZ</th>
                                <th>E-Mail</th>
                                <th>Telefon</th>
                                <th>Mobil</th>
                                <th class="actions-col">Aktionen</th>
                            </tr>
                        </thead>
                        <tbody id="contacts-body">
                            <!-- Kontakte werden hier geladen -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
